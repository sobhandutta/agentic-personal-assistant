<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask About Sobhan</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">

        <header id="header">
            <h1>Ask About Sobhan</h1>
            <span id="status-dot" class="dot disconnected" title="Disconnected"></span>
        </header>

        <main id="chat-window" role="log" aria-live="polite" aria-label="Chat messages">
            <div class="message assistant welcome">
                Hi! Ask me anything about Sobhan — his work history, skills, YouTube channel, creative work, or anything else.
            </div>
        </main>

        <footer id="input-bar">
            <textarea
                id="user-input"
                placeholder="Ask anything about Sobhan… (Enter to send, Shift+Enter for newline)"
                rows="1"
                aria-label="Message input"
                autofocus
            ></textarea>
            <button id="send-btn" aria-label="Send message">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" aria-hidden="true">
                    <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
                </svg>
            </button>
        </footer>

    </div>
    <script src="/static/app.js"></script>
</body>
</html>
